# permissions for end users to edit httpbins.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: httpbin-operator
    app.kubernetes.io/managed-by: kustomize
  name: httpbin-editor-role
rules:
- apiGroups:
  - orchestrate.platform-mesh.io
  resources:
  - httpbins
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - orchestrate.platform-mesh.io
  resources:
  - httpbins/status
  verbs:
  - get
