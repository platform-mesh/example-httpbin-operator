# permissions for end users to edit httpbindeployments.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: httpbin-operator
    app.kubernetes.io/managed-by: kustomize
  name: httpbindeployment-editor-role
rules:
- apiGroups:
  - orchestrate.cloud.sap
  resources:
  - httpbindeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - orchestrate.cloud.sap
  resources:
  - httpbindeployments/status
  verbs:
  - get
