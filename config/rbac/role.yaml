---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - orchestrate.cloud.sap
  resources:
  - httpbindeployments
  - httpbins
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - orchestrate.cloud.sap
  resources:
  - httpbindeployments/finalizers
  - httpbindeployments/status
  - httpbins/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - orchestrate.cloud.sap
  resources:
  - httpbins/finalizers
  verbs:
  - update
