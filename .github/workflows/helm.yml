name: Release Helm Charts

on:
  push:
    tags:
      - 'charts-*'
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read # to checkout the repository
  packages: write # to read packages

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Set HELM_REGISTRY_URI from Makefile
        run: |
          HELM_REGISTRY=$(make print-registry)
          echo "HELM_REGISTRY_URI=$HELM_REGISTRY" >> $GITHUB_ENV
          echo "Parsed Helm Registry URL $HELM_REGISTRY from Makefile..."

      - name:  Helm Registry Login
        run: |
          # workaround because of https://github.com/helm/helm/issues/30873#issuecomment-2930367515
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login -u "$GITHUB_ACTOR" --password-stdin ${{ env.HELM_REGISTRY_URI }}

      # Python is required because `ct lint` runs Yamale (https://github.com/23andMe/Yamale) and
      # yamllint (https://github.com/adrienverge/yamllint) which require Python
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: 3.x

      - uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2

      - run: ct lint --config ct.yaml
        env:
          CT_CHECK_VERSION_INCREMENT: false
          CT_VALIDATE_MAINTAINERS: false

      # TODO: Enable once the repository is public
      # - id: list-changed
      #   run: |
      #     changed=$(ct list-changed --config ct.yaml)
      #     if [[ -n "$changed" ]]; then
      #       echo "changed=true" >> $GITHUB_OUTPUT
      #     fi
      #
      # - uses: helm/kind-action@v1
      #   if: steps.list-changed.outputs.changed == 'true'
      #
      # - run: ct install --config ct.yaml
      #   if: steps.list-changed.outputs.changed == 'true'

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/charts-') }}
    needs: lint

    permissions:
      contents: write # to create releases
      packages: write # to create packages

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set HELM_REGISTRY_URI from Makefile
        run: |
          echo "HELM_REGISTRY_URI=$(make print-registry)" >> $GITHUB_ENV
          echo "CHART_VERSION=$(make print-helm-version)" >> $GITHUB_ENV

      - name: Set Chart Versions
        run: |
          sed -i \
            -e "s/^version: .*/version: ${{ env.CHART_VERSION }}/" \
            -e "s/^appVersion: .*/appVersion: ${{ env.CHART_VERSION }}/" \
            charts/*/Chart.yaml

      - name:  Helm Registry Login
        run: |
          # workaround because of https://github.com/helm/helm/issues/30873#issuecomment-2930367515
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login -u "${{ github.repository_owner }}" --password-stdin ${{ env.HELM_REGISTRY_URI }}

      - name: Configure Git for chart-releaser
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
        env:
          CR_GENERATE_RELEASE_NOTES: true
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true

      - name: Upload to OCI-based registry
        run: |
          if [ -d ".cr-release-packages" ]; then
            helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            find .cr-release-packages/ -name *.tgz -exec helm push {} oci://${{ env.HELM_REGISTRY_URI }}/charts \;
          fi
