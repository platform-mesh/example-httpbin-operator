name: auto-labeler

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-labeler:
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: platform-mesh/.github/.github/workflows/job-auto-labeler.yml@a92948421e9344929f5b9edd6048aa688c1b8ace # main
