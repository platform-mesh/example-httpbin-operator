name: docker-image
on:
  push:
    tags:
      - 'docker-*'
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - Makefile
      - Dockerfile
      - docker-bake.hcl
  workflow_dispatch:

permissions:
  contents: read # to checkout the repository
  packages: write # to create packages

jobs:
  docker:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: get-vars
        run: |
          echo "registry_uri=$(make print-registry)" >> $GITHUB_OUTPUT
          echo "version=$(make print-docker-version)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ${{ steps.get-vars.outputs.registry_uri }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@3acf805d94d93a86cce4ca44798a76464a75b88c # v6
        env:
          VERSION: ${{ steps.get-vars.outputs.version }}
        with:
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
