name: docker-image
on:
  push:
    tags:
      - 'docker-*'
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - Makefile
      - Dockerfile
      - docker-bake.hcl
  workflow_dispatch:

permissions:
  contents: read # to checkout the repository
  packages: write # to create packages

jobs:
  docker:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: get-vars
        run: |
          # registry from Makefile helper (fallback to GHCR)
          REGISTRY="$(make print-registry 2>/dev/null || echo ghcr.io/platform-mesh)"
          echo "registry_uri=${REGISTRY}" >> $GITHUB_OUTPUT

          # Determine version:
          # - on tag event refs/tags/docker-<version> -> use <version>
          # - on main branch -> dev-<short-sha>
          # - otherwise fallback to dev-<short-sha>
          if [[ "${GITHUB_REF}" == refs/tags/docker-* ]]; then
            VERSION="${GITHUB_REF#refs/tags/docker-}"
          else
            SHORT="$(git rev-parse --short HEAD)"
            VERSION="dev-${SHORT}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/example-httpbin-operator:${VERSION}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ${{ steps.get-vars.outputs.registry_uri }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@3acf805d94d93a86cce4ca44798a76464a75b88c # v6
        env:
          VERSION: ${{ steps.get-vars.outputs.version }}
        with:
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
