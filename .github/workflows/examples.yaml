name: examples

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: list-examples
        run: |
          {
            echo -n 'examples=['
            find examples -mindepth 1 -maxdepth 1 -type d -printf '"%f",'
            echo -n ']'
          } > "$GITHUB_OUTPUT"
          sed -i 's#,]#]#' "$GITHUB_OUTPUT"
    outputs:
      examples: ${{ steps.list-examples.outputs.examples }}

  # TODO: if we built the image every time anyhow this can also be done
  # in the docker-build job and the examples can depend on it
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          tags: local/local-httpbin:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  run-examples:
    runs-on: ubuntu-latest
    needs:
      - list-examples
      - build-image
    strategy:
      matrix:
        example: ${{ fromJson(needs.list-examples.outputs.examples) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: helm/kind-action@v1
        with:
          cluster_name: local-httpbin

      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          tags: local/local-httpbin:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - run: ./hack/markdown2script.sh ./examples/${{ matrix.example }}/readme.md noci > run.sh
      - run: cat ./run.sh
      - run: sh ./run.sh

