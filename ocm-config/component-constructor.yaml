# yaml-language-server: $schema= https://ocm.software/schemas/configuration-schema.yaml
# ocm get resources ghcr.io/platform-mesh/ocm//github.com/platform-mesh/example-httpbin-operator --latest -r -o treewide
components:
  - name: github.com/platform-mesh/example-httpbin-operator
    version: 0.1.0
    provider:
      name: platform-mesh
    resources:
      - name: oci-helm-chart-example-httpbin-operator
        type: helmChart
        version: 0.1.0
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/charts/example-httpbin-operator:0.1.0

      - name: image-example-httpbin-operator
        type: ociImage
        version: 0.1.0
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/example-httpbin-operator:0.1.0

    componentReferences:
      - name: http-bin-ui
        componentName: github.com/platform-mesh/httpbin-ui
        version: 0.2.1
        # docker pull component-descriptors/github.com/platform-mesh/httpbin-ui:0.2.1
      - name: kcp-dev-api-syncagent
        componentName: github.com/kcp-dev/api-syncagent
        version: 0.4.0
