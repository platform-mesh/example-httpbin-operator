# yaml-language-server: $schema= https://ocm.software/schemas/configuration-schema.yaml
# ocm get resources ghcr.io/platform-mesh/ocm//github.com/platform-mesh/httpbin-operator --latest -r -o treewide
components:
  - name: github.com/platform-mesh/httpbin-operator
    version: "${artifactVersion}"
    provider:
      name: platform-mesh
    resources:
      - name: oci-helm-chart-httpbin-operator
        type: helmChart
        version: "${artifactVersion}"
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/charts/httpbin-operator:0.5.6

      - name: image-httpbin-operator
        type: ociImage
        version: "${artifactVersion}"
        access:
          type: ociArtifact
          imageReference: ghcr.io/platform-mesh/httpbin-operator:0.5.10

      - name: kro-rgd
        type: blob
        version: "${artifactVersion}"
        input:
          type: file
          path: ./k8s/kro-rgd.yaml

      - name: open-delivery-gear-assessments
        type: blob
        version: "${artifactVersion}"
        input:
          type: file
          path: ./odg/assessments-dummy.yaml

    componentReferences:
      - name: http-bin-ui
        componentName: github.com/platform-mesh/httpbin-ui
        version: 0.2.1
        # docker pull component-descriptors/github.com/platform-mesh/httpbin-ui:0.2.1
      - name: kcp-dev-api-syncagent
        componentName: github.com/kcp-dev/api-syncagent
        version: 0.1.0
