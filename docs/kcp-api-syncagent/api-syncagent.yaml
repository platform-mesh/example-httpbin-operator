apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kcp-dev
  namespace: api-syncagent
spec:
  interval: 10m
  url: https://kcp-dev.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: api-syncagent
  namespace: api-syncagent
spec:
  chart:
    spec:
      chart: api-syncagent
      version: 0.1.0
      sourceRef:
        kind: HelmRepository
        name: kcp-dev
  releaseName: api-syncagent
  interval: 1m
  values:
    apiExportName: orchestrate.platform-mesh.io
    agentName: local-http-bin
    kcpKubeconfig: syncagent-provider-kubeconfig
